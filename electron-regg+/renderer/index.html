  <div class="workspace">

    <!-- PAINEL ESQUERDO: MAPA -->
    <section class="map-panel">
      <div class="panel-header">
        <span class="panel-title">Localização da Interferência</span>
        <span class="map-hint" id="mapHint">Clique no mapa para marcar a interferência</span>
      </div>
      <div id="map"></div>
      <div class="map-coords" id="mapCoords" style="display:none">
        <span id="coordDisplay"></span>
        <button class="btn-link" id="btnRemoveMarker">Remover marcador</button>
      </div>

      <div id="coord-converter"></div>
    </section>

    <!-- PAINEL DIREITO: FORMULÁRIO -->
    <section class="form-panel">
      <form id="documentForm" autocomplete="off">

        <!-- Seções ativas -->
        <div id="section-document"></div>

        <div class="location-row">
          <div id="section-address"       class="location-address"></div>
          <div id="section-interference"  class="location-interference"></div>
        </div>

        <div class="participants-row">
          <div id="section-user"        class="participant-col"></div>
          <div id="section-process"     class="participant-col"></div>
          <div id="section-attachment"  class="participant-col"></div>
        </div>

      </form>

      <div id="section-document-list"></div>

    </section>

  </div>

  <!-- Drawers — sobrepostos ao painel direito, abertos um de cada vez -->
  <div id="address-drawer"></div>
  <div id="interference-drawer"></div>
  <div id="user-drawer"></div>
  <div id="process-drawer"></div>
  <div id="annex-drawer"></div>

  <div class="toast" id="toast"></div>

  <script src="components/document-view.js"></script>
  <script src="components/address-view.js"></script>
  <script src="components/select-address.js"></script>
  <script src="components/select-interference.js"></script>
  <script src="components/select-user.js"></script>
  <script src="components/select-process.js"></script>
  <script src="components/select-annex.js"></script>
  <script src="components/interference-view.js"></script>
  <script src="components/user-view.js"></script>
  <script src="components/process-view.js"></script>
  <script src="components/annex-view.js"></script>
